name: Publish

# Publishes the self-contained `multicode-mcp` package to npm.
#
# The npm token is read from the repository secret `NPM_TOKEN` — it is NEVER stored in the repo.
# Add it once (repo → Settings → Secrets and variables → Actions), e.g.:
#   gh secret set NPM_TOKEN --repo <owner>/<repo>
# Then publish by creating a GitHub Release, or run this workflow manually (Actions → Publish → Run).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (pack without publishing)'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build and bundle
        run: |
          pnpm build
          pnpm --filter multicode-mcp bundle

      - name: Sanity-check the bundled binary
        run: node packages/cli/dist/bundle/multicode.js --version

      # `pnpm pack` resolves the `workspace:` protocol into the tarball's package.json, so plain
      # `npm publish <tarball>` (which does not understand workspace: specifiers) works cleanly.
      - name: Pack
        run: pnpm -C packages/cli pack --pack-destination "$RUNNER_TEMP"

      # Idempotency: skip publishing a version that already exists on npm, so re-runs (e.g. a
      # GitHub Release created after a manual publish) succeed instead of failing on a duplicate.
      - name: Check npm for this version
        id: pkg
        run: |
          NAME=$(node -p "require('./packages/cli/package.json').name")
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$NAME@$VERSION is already on npm — publish will be skipped."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: ${{ !inputs.dry_run && steps.pkg.outputs.published == 'false' }}
        run: npm publish "$RUNNER_TEMP"/multicode-mcp-*.tgz --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip (version already published)
        if: ${{ !inputs.dry_run && steps.pkg.outputs.published == 'true' }}
        run: echo "✔ ${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }} already on npm — nothing to publish."
